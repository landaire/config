#lazyjj.diff-format = "git"

[user]
name = "Lander Brandt"
email = "landerbrandt@gmail.com"

[ui]
editor = "nvim"
diff-formatter = ["difft", "--color=always", "$left", "$right"]
#diff-editor = "diffedit3"

#[colors]
# do not underline lines in hunks (since 0.19)
#"diff removed token" = { underline = false }
#"diff added token" = { underline = false }

[signing]
behavior = "own"
backend = "ssh"
key = "~/.ssh/id_ed25519"

[git]
sign-on-push = true

[fix.tools.rustfmt]
enabled = false
command = ["rustfmt", "+nightly", "--emit", "stdout"]
patterns = ["glob:'**/*.rs'"]

[fsmonitor]
backend = "watchman"

[fsmonitor.watchman]
register-snapshot-trigger = true

# [colors]
# "diff token" = { underline = false }
# "diff added token" = { bg = "#205020", fg = "#aaffaa" }
# "diff removed token" = { bg = "#502020", fg = "#ffaaaa" }
